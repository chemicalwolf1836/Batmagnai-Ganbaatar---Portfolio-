<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG card source — render at 1200×630</title>
<!--
  Source for assets/og/og-card.png (the LinkedIn/social share preview).
  To regenerate after edits:
  "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless \
    --window-size=1200,630 --screenshot=og-card.png og-card.html
-->
<style>
  /* Mirrors the site design tokens (style.css :root) — kept inline so the
     card renders identically with no external dependencies. */
  :root{
    --bg: #ffffff;
    --text: #111114;
    --muted: #5b5e66;
    --line: rgba(17,17,20,0.12);
    --accent: #ff2d2d;
    --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  *{ box-sizing: border-box; margin: 0; }
  body{
    width: 1200px;
    height: 630px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    align-items: center;
  }

  /* Skewed gridlines — echoes .gridlines from style.css */
  .gridlines{
    position: absolute;
    inset: -60px -60px auto -60px;
    height: 500px;
    background-image:
      linear-gradient(to right, rgba(17,17,20,0.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(17,17,20,0.06) 1px, transparent 1px);
    background-size: 56px 56px;
    transform: skewY(-4deg);
    transform-origin: top left;
  }

  /* Angled panels — echoes .angle.a1 / .angle.a2 */
  .angle{
    position: absolute;
    border: 1px solid var(--line);
    clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
  }
  .angle.a1{
    width: 380px; height: 260px;
    top: 80px; right: -130px;
    border-left: 7px solid rgba(255,45,45,0.9);
    background: rgba(255,45,45,0.03);
    transform: rotate(-8deg);
  }
  .angle.a2{
    width: 280px; height: 200px;
    top: 380px; right: 60px;
    border-top: 7px solid rgba(255,45,45,0.85);
    background: rgba(17,17,20,0.02);
    transform: rotate(-8deg);
  }

  .content{
    position: relative;
    padding: 0 96px;
  }
  .kicker{
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 28px;
  }
  /* Red parallelogram — echoes .brand-mark / .kicker i */
  .mark{
    width: 18px; height: 18px;
    background: #ff3b30;
    border-radius: 3px;
    clip-path: polygon(0 0, 100% 0, 70% 100%, 0 100%);
    box-shadow: 0 14px 32px rgba(255,45,45,0.22);
  }
  h1{
    font-size: 78px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.08;
    text-transform: uppercase;
  }
  h1 .accent{ color: var(--accent); }
  .tagline{
    margin-top: 22px;
    font-size: 30px;
    color: var(--muted);
  }
  .url{
    position: absolute;
    left: 96px; bottom: 64px;
    font-family: var(--mono);
    font-size: 20px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  /* Red baseline sweep — echoes the .card::after hover underline */
  .redline{
    position: absolute;
    left: 0; bottom: 0;
    width: 100%; height: 10px;
    background: var(--accent);
  }
</style>
</head>
<body>
  <div class="gridlines"></div>
  <div class="angle a1"></div>
  <div class="angle a2"></div>

  <div class="content">
    <div class="kicker"><span class="mark"></span> clean • sharp • fast</div>
    <h1>Batmagnai<br /><span class="accent">Ganbaatar</span></h1>
    <p class="tagline">Front End • Full Stack • AI Workflow — based in Tokyo</p>
  </div>

  <div class="url">batmagnai-ganbaatar-portfolio.vercel.app</div>
  <div class="redline"></div>
</body>
</html>
